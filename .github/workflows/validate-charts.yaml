name: Validate Charts

on:
  pull_request:
    branches:
      - main
    paths:
      - "charts/**"

permissions:
  contents: read

jobs:
  version-check:
    name: Chart Version Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check chart versions
        run: |
          .github/scripts/check-chart-versions.sh "origin/${{ github.base_ref }}"

  values-sync:
    name: Parent/Child Values Sync
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check parent/child values sync
        run: |
          python3 .github/scripts/check-values-sync.py --base-ref "origin/${{ github.base_ref }}"

  readme-reminder:
    name: README Reminder
    runs-on: ubuntu-latest
    # pull-requests: write lets us maintain a single sticky reminder comment.
    # The job still succeeds, so this stays non-blocking.
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check README sync (non-blocking)
        id: readme
        run: |
          .github/scripts/check-readme-sync.sh "origin/${{ github.base_ref }}"

      # Maintain ONE reminder comment on the PR. Keyed by a hidden marker, it is
      # created on the first flagged push and edited in place afterward, so
      # repeated pushes never add duplicate comments. When a later push fixes
      # the sync (no charts flagged), the comment is deleted. Skipped on fork
      # PRs, where GITHUB_TOKEN is read-only.
      - name: Sticky README reminder comment
        if: github.event.pull_request.head.repo.fork == false
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- readme-sync-reminder -->';
            const charts = '${{ steps.readme.outputs.charts }}'.split(',').filter(Boolean);
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number, per_page: 100,
            });
            const existing = comments.find(c => c.body.includes(marker));

            // No reminders needed: clean up any prior comment and stop.
            if (charts.length === 0) {
              if (existing) {
                await github.rest.issues.deleteComment({ owner, repo, comment_id: existing.id });
              }
              return;
            }

            const list = charts.map(c =>
              `- \`charts/${c}\` — \`values.yaml\` changed without a \`README.md\` update`).join('\n');
            const body = [
              marker,
              '### ⚠️ README sync reminder',
              '',
              'These charts changed `values.yaml` without touching their `README.md`.',
              'Confirm the README tables still reflect the values, then update them if needed.',
              '',
              list,
            ].join('\n');

            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
