name: Validate Charts

on:
  pull_request:
    branches:
      - main
    paths:
      - "charts/**"

permissions:
  contents: read

jobs:
  version-check:
    name: Chart Version Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check chart versions
        run: |
          .github/scripts/check-chart-versions.sh "origin/${{ github.base_ref }}"

  values-sync:
    name: Parent/Child Values Sync
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check parent/child values sync
        run: |
          python3 .github/scripts/check-values-sync.py --base-ref "origin/${{ github.base_ref }}"

  readme-reminder:
    name: README Sync Reminder
    runs-on: ubuntu-latest
    # checks: write lets us publish a neutral (yellow) check run carrying the
    # reminder. The job itself still succeeds, so this stays non-blocking.
    permissions:
      contents: read
      checks: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check README sync (non-blocking)
        id: readme
        run: |
          .github/scripts/check-readme-sync.sh "origin/${{ github.base_ref }}"

      # Publish a separate check run so the reminder shows as yellow on the PR.
      # A job conclusion can only be success/failure, so the warning would
      # otherwise hide behind a green check. action_required is the only
      # *completed* conclusion GitHub renders yellow (neutral renders grey).
      # Skipped on fork PRs, where GITHUB_TOKEN is read-only and cannot write checks.
      - name: Publish README sync check run
        if: steps.readme.outputs.warnings != '0' && github.event.pull_request.head.repo.fork == false
        uses: actions/github-script@v7
        with:
          script: |
            const charts = '${{ steps.readme.outputs.charts }}'.split(',').filter(Boolean);
            const count = charts.length;
            const list = charts.map(c => `- \`charts/${c}/values.yaml\` changed without a \`README.md\` update`).join('\n');
            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'README Sync',
              head_sha: context.payload.pull_request.head.sha,
              status: 'completed',
              conclusion: 'action_required',
              output: {
                title: `${count} chart${count === 1 ? '' : 's'} may need a README update`,
                summary: [
                  'These charts changed `values.yaml` without touching their `README.md`.',
                  'Confirm the README tables still reflect the values, then update them if needed.',
                  '',
                  list,
                ].join('\n'),
              },
            });
