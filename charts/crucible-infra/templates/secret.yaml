{{- if .Values.postgresql.enabled }}
{{- /* Persist postgres superuser password on chart reinstall */ -}}
{{- $postgresPassword := "" }}
{{- $postgresqlSecret := lookup "v1" "Secret" .Release.Namespace (printf "%s-postgresql" .Release.Name) }}
{{- if and $postgresqlSecret (hasKey $postgresqlSecret.data "password") }}
{{-   $postgresPassword = index $postgresqlSecret.data "password" | b64dec }}
{{- else }}
{{-   $postgresPassword = randAlphaNum 16 }}
{{- end }}

apiVersion: v1
kind: Secret
type: kubernetes.io/basic-auth
metadata:
  name: {{ .Release.Name }}-postgresql
  labels:
    cnpg.io/reload: "true"
    {{- include "crucible-infra.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
data:
  username: {{ "postgres" | b64enc | quote }}
  password: {{ $postgresPassword | b64enc | quote }}

---
{{- /* Per-database user secrets (skip databases with custom owner) */ -}}
{{- range .Values.postgresql.databases }}
{{- if not .owner }}
{{- $dbSecretName := printf "%s-db-%s" $.Release.Name (.name | replace "_" "-") }}
{{- $dbPassword := randAlphaNum 16 }}
{{- $existingDbSecret := lookup "v1" "Secret" $.Release.Namespace $dbSecretName }}
{{- if and $existingDbSecret (hasKey $existingDbSecret.data "password") }}
  {{- $dbPassword = index $existingDbSecret.data "password" | b64dec }}
{{- end }}
apiVersion: v1
kind: Secret
type: kubernetes.io/basic-auth
metadata:
  name: {{ $dbSecretName }}
  labels:
    cnpg.io/reload: "true"
    {{- include "crucible-infra.labels" $ | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
data:
  username: {{ .name | b64enc | quote }}
  password: {{ $dbPassword | b64enc | quote }}
---
{{- end }}
{{- end }}
{{- end }}
{{- if .Values.pgadmin4.enabled }}
{{- /* Persist pgAdmin password on chart reinstall */ -}}
{{- $pgadminPassword := "" }}
{{- $pgadminSecret := lookup "v1" "Secret" .Release.Namespace (printf "%s-pgadmin" (include "crucible-infra.fullname" .)) }}
{{- if $pgadminSecret }}
{{-   $pgadminPassword = index $pgadminSecret.data "password" | b64dec }}
{{- else }}
{{-   $pgadminPassword = randAlphaNum 16 }}
{{- end }}

apiVersion: v1
kind: Secret
metadata:
  name: {{ include "crucible-infra.fullname" . }}-pgadmin
  labels:
    {{- include "crucible-infra.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  password: {{ $pgadminPassword | b64enc | quote }}

---
{{- end }}
{{- /* TLS Certificate Secret - only created if tls.create is enabled */ -}}
{{- if .Values.tls.create }}
{{- if and .Values.tls.certFile .Values.tls.keyFile }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.tls.secretName | default "crucible-cert" }}
  labels:
    {{- include "crucible-infra.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: kubernetes.io/tls
data:
  tls.crt: {{ (.Files.Get .Values.tls.certFile | b64enc) | quote }}
  tls.key: {{ (.Files.Get .Values.tls.keyFile | b64enc) | quote }}
{{- end }}
{{- end }}
