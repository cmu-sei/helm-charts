# Keycloak realm import is handled by the chart based on the keycloak.createRealm
# and keycloak.importRealmConfigMap values in values.yaml.
#
# When createRealm is true, the chart generates a realm ConfigMap with unique
# client secrets in secret.yaml (crucible-oidc-client-secrets).
#
# When importRealmConfigMap is set, configure keycloak.extraEnvVars,
# keycloak.extraVolumes, and keycloak.extraVolumeMounts in your values to
# reference the provided ConfigMap.
