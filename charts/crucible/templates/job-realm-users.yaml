{{- if .Values.keycloak.createRealm }}
apiVersion: batch/v1
kind: Job
metadata:
  name: "{{ .Release.Name }}-realm-user-setup"
  labels:
    {{- include "crucible.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": hook-succeeded,before-hook-creation
spec:
  backoffLimit: 30
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: setup
          image: alpine:3.19
          command:
            - /bin/sh
            - -c
            - |
              apk add --no-cache curl jq > /dev/null 2>&1

              echo "Waiting for Keycloak to be ready..."
              until curl -sf "${KEYCLOAK_URL}/realms/crucible" > /dev/null 2>&1; do
                sleep 5
              done
              echo "Keycloak is ready"

              # Get admin token from master realm
              TOKEN=$(curl -sf -X POST "${KEYCLOAK_URL}/realms/master/protocol/openid-connect/token" \
                -d "client_id=admin-cli" \
                -d "username=${KC_ADMIN_USER}" \
                -d "password=${KC_ADMIN_PASSWORD}" \
                -d "grant_type=password" | jq -r '.access_token')

              if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
                echo "ERROR: Failed to get admin token"
                exit 1
              fi

              # Find admin user in crucible realm
              USER_ID=$(curl -sf -H "Authorization: Bearer ${TOKEN}" \
                "${KEYCLOAK_URL}/admin/realms/crucible/users?username=admin&exact=true" | jq -r '.[0].id')

              if [ -z "$USER_ID" ] || [ "$USER_ID" = "null" ]; then
                echo "ERROR: Admin user not found in crucible realm"
                exit 1
              fi

              # Set admin password
              HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" -X PUT \
                -H "Authorization: Bearer ${TOKEN}" \
                -H "Content-Type: application/json" \
                "${KEYCLOAK_URL}/admin/realms/crucible/users/${USER_ID}/reset-password" \
                -d "{\"type\":\"password\",\"value\":\"${REALM_ADMIN_PASSWORD}\",\"temporary\":false}")

              if [ "$HTTP_CODE" = "204" ]; then
                echo "Crucible realm admin password set successfully"
              else
                echo "ERROR: Failed to set admin password (HTTP ${HTTP_CODE})"
                exit 1
              fi
          env:
            - name: KC_ADMIN_USER
              value: "keycloak-admin"
            - name: KC_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "crucible.fullname" . }}-keycloak-auth
                  key: admin-password
            - name: REALM_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: crucible-oidc-client-secrets
                  key: realm-admin-password
            - name: KEYCLOAK_URL
              value: "http://{{ .Release.Name }}-keycloak:80/keycloak"
{{- end }}
