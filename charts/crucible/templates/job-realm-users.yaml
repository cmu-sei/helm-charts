{{- if .Values.keycloak.createRealm }}
apiVersion: batch/v1
kind: Job
metadata:
  name: "{{ .Release.Name }}-realm-user-setup"
  labels:
    {{- include "crucible.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 30
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "crucible.fullname" . }}-realm-setup
      containers:
        - name: setup
          image: rancher/kubectl:latest
          command:
            - /bin/sh
            - -c
            - |
              KEYCLOAK_POD="{{ include "crucible.fullname" . }}-keycloak-0"
              KCADM="/opt/keycloak/bin/kcadm.sh"
              KC_SERVER="http://localhost:8080/keycloak"
              KCADM_AUTH="--no-config --server ${KC_SERVER} --realm master --user ${KC_ADMIN_USER} --password ${KC_ADMIN_PASSWORD}"

              echo "Waiting for Keycloak pod to be ready..."
              until kubectl get pod "${KEYCLOAK_POD}" -o jsonpath='{.status.containerStatuses[0].ready}' 2>/dev/null | grep -q "true"; do
                sleep 5
              done
              echo "Keycloak pod is ready"

              echo "Waiting for crucible realm..."
              until kubectl exec "${KEYCLOAK_POD}" -- ${KCADM} get realms/crucible ${KCADM_AUTH} > /dev/null 2>&1; do
                sleep 5
              done
              echo "Crucible realm is available"

              # Find admin user in crucible realm
              USER_JSON=$(kubectl exec "${KEYCLOAK_POD}" -- ${KCADM} get users -r crucible ${KCADM_AUTH} -q username=admin -q exact=true 2>/dev/null)
              USER_ID=$(echo "${USER_JSON}" | grep -o '"id" *: *"[^"]*"' | head -1 | sed 's/.*: *"//;s/"//')

              if [ -z "${USER_ID}" ] || [ "${USER_ID}" = "null" ]; then
                echo "ERROR: Admin user not found in crucible realm"
                exit 1
              fi
              echo "Found admin user: ${USER_ID}"

              # Set admin password
              if kubectl exec "${KEYCLOAK_POD}" -- ${KCADM} set-password -r crucible ${KCADM_AUTH} \
                --userid "${USER_ID}" --new-password "${REALM_ADMIN_PASSWORD}"; then
                echo "Crucible realm admin password set successfully"
              else
                echo "ERROR: Failed to set admin password"
                exit 1
              fi
          env:
            - name: KC_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "crucible.keycloakAdminSecretName" . }}
                  key: username
            - name: KC_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "crucible.keycloakAdminSecretName" . }}
                  key: password
            - name: REALM_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: crucible-oidc-client-secrets
                  key: realm-admin-password
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "crucible.fullname" . }}-realm-setup
  labels:
    {{- include "crucible.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "crucible.fullname" . }}-realm-setup
  labels:
    {{- include "crucible.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "crucible.fullname" . }}-realm-setup
  labels:
    {{- include "crucible.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation
subjects:
  - kind: ServiceAccount
    name: {{ include "crucible.fullname" . }}-realm-setup
roleRef:
  kind: Role
  name: {{ include "crucible.fullname" . }}-realm-setup
  apiGroup: rbac.authorization.k8s.io
{{- end }}
