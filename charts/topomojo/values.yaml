  nameOverride: ""
  fullnameOverride: ""

  serviceAccount:
    create: false
    annotations: {}
    # If name is not set and create is true,
    # a name is generated using the fullname template
    name: ""

  podAnnotations: {}
  podSecurityContext: {}
  securityContext: {}
