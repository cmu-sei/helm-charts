topomojo-api:
  image:
    repository: cmusei/topomojo-api
    pullPolicy: IfNotPresent
    # Overrides the image tag whose default is the chart appVersion.
    tag: ""

  imagePullSecrets: []
  nameOverride: ""
  fullnameOverride: ""

  serviceAccount:
    create: true
    annotations: {}
    # If name is not set and create is true,
    # a name is generated using the fullname template
    name: ""

  podAnnotations: {}
  podSecurityContext: {}
  securityContext: {}
    # capabilities:
    #   drop:
    #   - ALL
    # readOnlyRootFilesystem: true
    # runAsNonRoot: true
    # runAsUser: 1000

  service: {}
    # type: ClusterIP
    # port: 80

  resources: {}
    # We usually recommend not to specify default resources and to leave this as a conscious
    # choice for the user. This also increases chances charts run on environments with little
    # resources, such as Minikube. If you do want to specify resources, uncomment the following
    # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
    # limits:
    #   cpu: 200m
    #   memory: 512Mi
    # requests:
    #   cpu: 100m
    #   memory: 256Mi

  nodeSelector: {}
  tolerations: []
  affinity: {}

  health: {}
    # livenessProbe:
    #   initialDelaySeconds: 10
    #   httpGet:
    #     path: /api/healthz
    #     port: http
    # startupProbe:
    #   initialDelaySeconds: 30
    #   httpGet:
    #     path: /api/healthz
    #     port: http
    #   failureThreshold: 9
    #   periodSeconds: 10

  ingress:
    enabled: true
    className: ""
    annotations: {}
    hosts:
      - host: chart-example.local
        paths:
          - path: /(api|hub|docs|theme)
            pathType: ImplementationSpecific
    tls: []
    #  - secretName: chart-example-tls
    #    hosts:
    #      - chart-example.local

  # Optional second ingress for topomojo api
  # - This ingress is used as a proxy for getting a websocket
  #   console connection to vCenter hosts.
  # - TLS and Host URLs need configured, but the snippet should be left alone
  #
  # Topomojo is hardcoded to pass the vmware host using a query parameter named "vmhost".
  # nginx supports a syntax to resolve variables of the form $arg_name to a query
  # parameter with key "name" in the request line.
  # That parameter is "vmhost" for this case.
  #
  # nginx resolves $1 to the value of the first capture group of the regex for location:
  # /console/ticket/(.*)
  # so this means we expect the ticket number to be whatever value is after
  # /console/ticket/ in the request path.
  #
  # An example websocket request that would match this rule is:
  # wss://connect.example.com/console/ticket/6e71189b23e5ade2?vmhost=10.4.52.68
  #
  # NOTES:
  # - This is only used if deployConsoleProxy below is true, otherwise
  #   connections will go directly from the UI to the vCenter hosts themselves
  # This ingress requires the following properties to be set on the nginx controller via the ConfigMap
  #    allow-snippet-annotations: true
  #    annotations-risk-level: critical  # Became necessary as of ingress-nginx helm chart v4.12
  consoleIngress:
    deployConsoleProxy: false
    className: ""
    namespace:
    annotations:
      kubernetes.io/ingress.class: nginx
      nginx.ingress.kubernetes.io/server-snippet: |
        # Adding proxy configuration for consoles
        location ~ /console/ticket/(.*) {
          proxy_pass https://$arg_vmhost/ticket/$1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";
          proxy_request_buffering off;
          proxy_buffering off;
          proxy_read_timeout 86400s;
          proxy_send_timeout 86400s;
          proxy_ssl_session_reuse on;
        }
    hosts:
      - host: chart-example.local
        paths: []
    tls: []
    #  - secretName: chart-example-tls
    #    hosts:
    #      - chart-example.local

  # If this deployment needs to trust non-public certificates,
  # create a configMap with the needed certificates and specify
  # the configMap name here
  certificateMap: ""

  # storage - either an existing pvc, the size for a new pvc, or emptyDir
  storage:
    existing: ""
    size: ""
    mode: ReadWriteOnce
    class: default

  ## migrations sets how data migrations run
  ## If enabled, all replicas will wait until a single migration job runs.
  ## this is important if running multiple replicas or if you use different
  ## connection strings (permissions) for building the database versus using it.
  ## If using a single connection string, no need to specify here. It will use values
  ## from `env` below.
  ## NOTE: the serviceAccount must have permission to `get batch.jobs`.
  ## If you create the serviceAccount above, it will get a RoleBinding to a Role with that allowed.
  migrations:
    enabled: false
    restartPolicy: Never
    Database__Provider: ""
    Database__ConnectionString: ""
    env: {}

  ## customStart overrides the default start process.  Files are mounted in `/start`
  customStart: {}
    # command: ['/bin/sh']
    # args: ['/start/start.sh']
    # binaryFiles: {}
    # files:
    #   start.sh: |
    #     #!/bin/sh
    #     cp /start/*.crt /usr/local/share/ca-certificates && update-ca-certificates
    #     cd /app && dotnet TopoMojo.Api.dll
    #   cacert.crt: ""

  ## existingSecret references a secret already in k8s. The values are saved as files in `/home/app/conf`.
  existingSecret: ""

  ## extraEnvFrom injects additional envFrom sources (secrets or configmaps) into the API container.
  ## Useful for mounting externally managed secrets.
  ## Each entry follows the Kubernetes envFrom spec (secretRef or configMapRef).
  extraEnvFrom: []
  # - secretRef:
  #     name: my-secret
  # - configMapRef:
  #     name: my-configmap

  # Config app settings with environment vars.
  # Those most likely needing values are listed. For others,
  # see https://github.com/cmu-sei/TopoMojo/blob/main/src/TopoMojo.Api/appsettings.conf
  env:
    ## By default we change ownership of the paths at and recursively below the root of the topomojo docs directory
    ## to that of the running user and group, which are both 1654 per .NET conventions.
    SKIP_VOL_PERMISSIONS: "false"
    # PathBase: ""
    # Oidc__Audience: topomojo-api
    # Oidc__Authority: http://localhost:5000
    ## Set this to the string "null" to disable client credentials authentication (enabled by default)
    # Oidc__ServiceAccountClientIdClaimType: client_id
    # Oidc__UserRolesClaimMap__administrator: Administrator
    # Oidc__UserRolesClaimMap__builder: Builder
    # Oidc__UserRolesClaimMap__creator: Creator
    # Oidc__UserRolesClaimMap__observer: Observer
    # Oidc__UserRolesClaimMap__user: user
    # Oidc__UserRolesClaimPath = realm_access.roles

    # Database__Provider: InMemory
    # Database__ConnectionString: topomojo_db
    # Database__SeedFile: seed-data.json
    # Database__AdminId: ""
    # Database__AdminName: ""

    # Cache__RedisUrl: ""
    # Cache__Key: ""
    # Cache__SharedFolder: ""

    # OpenApi__Enabled: true
    # OpenApi__ApiName: TopoMojo
    # OpenApi__Client__ClientId: topomojo-swagger

    # FileUpload__TopoRoot: /mnt/tm
    ## In NFS mode (UseDatastoreApi=false), override this to a path backed by
    ## the NFS share your ESXi hosts also mount as a vSphere datastore.
    # FileUpload__IsoRoot: /mnt/tm/isos
    ## DocRoot points at the chart's dedicated wwwroot/docs mount so uploaded
    ## images are served by ASP.NET's static-file handler.
    # FileUpload__DocRoot: /home/app/wwwroot/docs
    # FileUpload__MaxFileBytes: 21474836480  # 20GB
    # FileUpload__SupportsSubfolders: false  # Set false for Proxmox with local ISO storage

    ## VMware Cloud API upload settings (when NFS mount unavailable).
    ## TempRoot is set to a subdirectory of the existing topomojo
    ## PVC mount; the vol-permissions init container creates and chowns it.
    ## Override only if you have provisioned alternative storage yourself.
    # FileUpload__TempRoot: /mnt/tm/_iso-staging
    # FileUpload__UseDatastoreApi: false
    # FileUpload__UploadTimeoutMinutes: 180
    # FileUpload__TempFileExpirationHours: 24

    # Core__DefaultGamespaceMinutes: 120
    # Core__DefaultGamespaceLimit: 2
    # Core__DefaultWorkspaceLimit: 0
    # Core__DefaultTemplateLimit: 3
    # Core__DefaultUserScope: everyone
    # Core__ReplicaLimit: 5
    # Core__NetworkHostTemplateId: 0
    # Core__GameEngineIsoFolder: static
    # Core__ConsoleHost: ""
    # Core__LaunchUrl: /lp
    # Core__DocPath: wwwroot/docs
    # Core__AllowUnprivilegedVmReconfigure: false

    # Pod__Url: ""
    # Pod__User: ""
    # Pod__Password: ""
    # Pod__PoolPath: ""
    # Pod__Uplink: vSwitch0
    # Pod__VmStore: ""
    # Pod__IsoStore: ""
    # Pod__DiskStore: ""
    # Pod__TicketUrlHandler: querystring
    # Pod__Vlan__Range: ""
    # Pod__KeepAliveMinutes: 10
    # Pod__DebugVerbose: false
    # Pod__IsNsxNetwork: false
    # Pod__Sddc__ApiUrl: ""
    # Pod__Sddc__MetadataUrl: ""
    # Pod__Sddc__SegmentApiPath = policy/api/v1/infra/tier-1s/cgw/segments
    # Pod__Sddc__ApiKey: ""
    # Pod__Sddc__AuthUrl: ""
    # Pod__Sddc__CertificatePath: ""
    # Pod__Sddc__CertificatePassword: ""

    # Logging__Console__DisableColors: false
    # Logging__LogLevel__Default: Information

    # Ui__Branding__BackgroundImageUrl = theme/demo.png

    # Open Telemetry
    # OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317

    # These settings toggle ServiceDefaults configurations for Otel
    # OpenTelemetry__AddAlwaysOnTracingSampler: false
    # OpenTelemetry__AddConsoleExporter: false
    # OpenTelemetry__AddPrometheusExporter: false
    # OpenTelemetry__IncludeDefaultActivitySources: true
    # OpenTelemetry__IncludeDefaultMeters: true

    # Optional: force HTTP instead of the default gRPC protocol
    # OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
    # Optional: override the service name reported to collectors
    # OTEL_SERVICE_NAME: topomojo-api

  ## Create a seed data file based on the contents of an existing secret
  ## or by values that support templating via the tpl function.
  seedData:
    # If specified, the secret at the specified key is used as the contents of the file.
    # Note that this data must be in JSON format for an existing secret.
    existingSeedDataSecretName: ""
    existingSeedDataSecretKey: "seedData"
    # Yaml structure that will be converted to JSON and used as the file contents if
    # existingSeedDataSecretName is not specified.
    values: {}
    # Example values for setting an admin user
    # values:
    #   Users:
    #     - GlobalId: "9fd3c38e-58b0-4af1-80d1-1895af91f1f9"
    #       Name: "Administrator"
    #       ServiceAccountClientId: "123yourId"
    #       IsAdmin: true

