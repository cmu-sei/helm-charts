# Crucible Operators Chart Values
# Installs Keycloak Operator and CloudNative-PG Operator as prerequisites
# for the Crucible platform Helm charts.

# Keycloak Operator
# https://www.keycloak.org/operator/installation
keycloak:
  enabled: true
  # Operator version - must match the CRD and deployment manifest versions
  version: "26.5.6"

# CloudNative-PG Operator
# https://cloudnative-pg.io/
cnpg:
  enabled: true

# Override any cloudnative-pg subchart values here
cloudnative-pg: {}
