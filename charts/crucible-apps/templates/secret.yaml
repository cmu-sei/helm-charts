{{/* Helper function to get database credentials from app config */}}
{{- define "crucible.getDbCreds" -}}
{{- $dbConfig := .dbConfig -}}
{{- $context := .context -}}
{{- $host := default "" $dbConfig.host -}}
{{- $port := default 5432 $dbConfig.port -}}
{{- $dbName := default "" $dbConfig.name -}}
{{- $secretName := default "" $dbConfig.existingSecret -}}
{{- $usernameKey := default "username" $dbConfig.usernameKey -}}
{{- $passwordKey := default "password" $dbConfig.passwordKey -}}
{{- $user := "postgres" -}}
{{- $password := randAlphaNum 16 -}}
{{- if $secretName -}}
{{-   $dbSecret := lookup "v1" "Secret" $context.Release.Namespace $secretName -}}
{{-   if $dbSecret -}}
{{-     $user = index $dbSecret.data $usernameKey | b64dec -}}
{{-     $password = index $dbSecret.data $passwordKey | b64dec -}}
{{-   end -}}
{{- end -}}
{{- printf "Server=%s;Port=%v;Database=%s;Username=%s;Password=%s;SSL Mode=Prefer;Trust Server Certificate=true;" $host $port $dbName $user $password -}}
{{- end -}}

{{/* Validate realm configuration */}}
{{- include "crucible.validateRealmConfig" . -}}

{{/* Persist Keycloak secrets on chart reinstall */}}
{{- $keycloakSecret := lookup "v1" "Secret" .Release.Namespace (printf "%s-keycloak-auth" (include "crucible.fullname" .)) -}}
{{- $keycloakAdminPassword := randAlphaNum 16 -}}
{{- $keycloakOauthClientSecret := (randBytes 16 | b64dec | printf "%032x") -}}
{{- $keycloakDefaultUserGuid := uuidv4 -}}

{{- if and $keycloakSecret (hasKey $keycloakSecret.data "admin-password") -}}
  {{- $keycloakAdminPassword = (index $keycloakSecret.data "admin-password" | b64dec) -}}
{{- end }}
{{- if and $keycloakSecret (hasKey $keycloakSecret.data "oauth-client-secret") -}}
  {{- $keycloakOauthClientSecret = (index $keycloakSecret.data "oauth-client-secret" | b64dec) -}}
{{- end }}
{{- if and $keycloakSecret (hasKey $keycloakSecret.data "default-user-guid") -}}
  {{- $keycloakDefaultUserGuid = (index $keycloakSecret.data "default-user-guid" | b64dec) -}}
{{- end }}

{{/* OIDC client secret generation when createRealm is enabled */}}
{{- $createRealm := .Values.keycloak.createRealm | default false -}}
{{- $alloyAdminSecret := "" -}}
{{- $gameboardApiSecret := "" -}}
{{- $playerVmWebhooksSecret := "" -}}
{{- $grafanaSecret := "" -}}
{{- $moodleClientSecret := "" -}}
{{- $playerVmAdminSecret := "" -}}
{{- $blueprintAdminSecret := "" -}}
{{- $citeAdminSecret := "" -}}
{{- $galleryAdminSecret := "" -}}
{{- $steamfitterAdminSecret := "" -}}
{{- $casterAdminSecret := "" -}}
{{- $crucibleProviderSecret := "" -}}
{{- $realmAdminPassword := "" -}}

{{- if $createRealm -}}
{{- $oidcSecretName := "crucible-oidc-client-secrets" -}}
{{- $existingOidc := lookup "v1" "Secret" .Release.Namespace $oidcSecretName -}}

{{- $alloyAdminSecret = randAlphaNum 32 -}}
{{- $gameboardApiSecret = randAlphaNum 32 -}}
{{- $playerVmWebhooksSecret = randAlphaNum 32 -}}
{{- $grafanaSecret = randAlphaNum 32 -}}
{{- $moodleClientSecret = randAlphaNum 32 -}}
{{- $playerVmAdminSecret = randAlphaNum 32 -}}
{{- $blueprintAdminSecret = randAlphaNum 32 -}}
{{- $citeAdminSecret = randAlphaNum 32 -}}
{{- $galleryAdminSecret = randAlphaNum 32 -}}
{{- $steamfitterAdminSecret = randAlphaNum 32 -}}
{{- $casterAdminSecret = randAlphaNum 32 -}}
{{- $crucibleProviderSecret = randAlphaNum 32 -}}
{{- $configuredRealmAdminPassword := .Values.keycloak.realmAdminPassword | default "" -}}
{{- if $configuredRealmAdminPassword -}}
  {{- $realmAdminPassword = $configuredRealmAdminPassword -}}
{{- else -}}
  {{- $realmAdminPassword = randAlphaNum 16 -}}
{{- end -}}

{{- if $existingOidc -}}
  {{- if hasKey $existingOidc.data "alloy-admin" -}}
    {{- $alloyAdminSecret = index $existingOidc.data "alloy-admin" | b64dec -}}
  {{- end -}}
  {{- if hasKey $existingOidc.data "gameboard-api" -}}
    {{- $gameboardApiSecret = index $existingOidc.data "gameboard-api" | b64dec -}}
  {{- end -}}
  {{- if hasKey $existingOidc.data "player-vm-webhooks" -}}
    {{- $playerVmWebhooksSecret = index $existingOidc.data "player-vm-webhooks" | b64dec -}}
  {{- end -}}
  {{- if hasKey $existingOidc.data "grafana" -}}
    {{- $grafanaSecret = index $existingOidc.data "grafana" | b64dec -}}
  {{- end -}}
  {{- if hasKey $existingOidc.data "moodle-client" -}}
    {{- $moodleClientSecret = index $existingOidc.data "moodle-client" | b64dec -}}
  {{- end -}}
  {{- if hasKey $existingOidc.data "player-vm-admin" -}}
    {{- $playerVmAdminSecret = index $existingOidc.data "player-vm-admin" | b64dec -}}
  {{- end -}}
  {{- if hasKey $existingOidc.data "blueprint-admin" -}}
    {{- $blueprintAdminSecret = index $existingOidc.data "blueprint-admin" | b64dec -}}
  {{- end -}}
  {{- if hasKey $existingOidc.data "cite-admin" -}}
    {{- $citeAdminSecret = index $existingOidc.data "cite-admin" | b64dec -}}
  {{- end -}}
  {{- if hasKey $existingOidc.data "gallery-admin" -}}
    {{- $galleryAdminSecret = index $existingOidc.data "gallery-admin" | b64dec -}}
  {{- end -}}
  {{- if hasKey $existingOidc.data "steamfitter-admin" -}}
    {{- $steamfitterAdminSecret = index $existingOidc.data "steamfitter-admin" | b64dec -}}
  {{- end -}}
  {{- if hasKey $existingOidc.data "caster-admin" -}}
    {{- $casterAdminSecret = index $existingOidc.data "caster-admin" | b64dec -}}
  {{- end -}}
  {{- if hasKey $existingOidc.data "crucible-provider" -}}
    {{- $crucibleProviderSecret = index $existingOidc.data "crucible-provider" | b64dec -}}
  {{- end -}}
  {{- if and (not $configuredRealmAdminPassword) (hasKey $existingOidc.data "realm-admin-password") -}}
    {{- $realmAdminPassword = index $existingOidc.data "realm-admin-password" | b64dec -}}
  {{- end -}}
{{- end -}}
{{- end -}}

apiVersion: v1
kind: Secret
metadata:
  name: {{ include "crucible.fullname" . }}-keycloak-auth
  labels:
    {{- include "crucible.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  admin-password: {{ $keycloakAdminPassword }}
  oauth-client-secret: {{ $keycloakOauthClientSecret }}
  default-user-guid: {{ $keycloakDefaultUserGuid }}

{{- if $createRealm }}
---
{{/* OIDC Client Secrets - persisted across upgrades */}}
apiVersion: v1
kind: Secret
metadata:
  name: crucible-oidc-client-secrets
  labels:
    {{- include "crucible.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  alloy-admin: {{ $alloyAdminSecret }}
  gameboard-api: {{ $gameboardApiSecret }}
  player-vm-webhooks: {{ $playerVmWebhooksSecret }}
  grafana: {{ $grafanaSecret }}
  moodle-client: {{ $moodleClientSecret }}
  player-vm-admin: {{ $playerVmAdminSecret }}
  blueprint-admin: {{ $blueprintAdminSecret }}
  cite-admin: {{ $citeAdminSecret }}
  gallery-admin: {{ $galleryAdminSecret }}
  steamfitter-admin: {{ $steamfitterAdminSecret }}
  caster-admin: {{ $casterAdminSecret }}
  crucible-provider: {{ $crucibleProviderSecret }}
  realm-admin-password: {{ $realmAdminPassword }}
{{- end }}

{{- if $createRealm }}
{{- $realmJson := .Files.Get "files/crucible-realm.json" -}}
{{- $realmJson = $realmJson | replace "__DOMAIN__" .Values.global.domain -}}
{{- $realmJson = $realmJson | replace "__ADMIN_USERNAME__" (default "admin" .Values.keycloak.realmAdminUsername) -}}
{{- $realmJson = $realmJson | replace "__ADMIN_EMAIL__" (default "admin@crucible.dev" .Values.keycloak.realmAdminEmail) -}}
{{- $realmJson = $realmJson | replace "__ALLOY_ADMIN_SECRET__" $alloyAdminSecret -}}
{{- $realmJson = $realmJson | replace "__GAMEBOARD_API_SECRET__" $gameboardApiSecret -}}
{{- $realmJson = $realmJson | replace "__PLAYER_VM_WEBHOOKS_SECRET__" $playerVmWebhooksSecret -}}
{{- $realmJson = $realmJson | replace "__GRAFANA_SECRET__" $grafanaSecret -}}
{{- $realmJson = $realmJson | replace "__MOODLE_CLIENT_SECRET__" $moodleClientSecret -}}
{{- $realmJson = $realmJson | replace "__PLAYER_VM_ADMIN_SECRET__" $playerVmAdminSecret -}}
{{- $realmJson = $realmJson | replace "__BLUEPRINT_ADMIN_SECRET__" $blueprintAdminSecret -}}
{{- $realmJson = $realmJson | replace "__CITE_ADMIN_SECRET__" $citeAdminSecret -}}
{{- $realmJson = $realmJson | replace "__GALLERY_ADMIN_SECRET__" $galleryAdminSecret -}}
{{- $realmJson = $realmJson | replace "__STEAMFITTER_ADMIN_SECRET__" $steamfitterAdminSecret -}}
{{- $realmJson = $realmJson | replace "__CASTER_ADMIN_SECRET__" $casterAdminSecret -}}
{{- $realmJson = $realmJson | replace "__CRUCIBLE_PROVIDER_SECRET__" $crucibleProviderSecret }}
---
{{/* KeycloakRealmImport CR */}}
apiVersion: k8s.keycloak.org/v2alpha1
kind: KeycloakRealmImport
metadata:
  name: {{ include "crucible.fullname" . }}-realm
  labels:
    {{- include "crucible.labels" . | nindent 4 }}
spec:
  keycloakCRName: {{ include "crucible.fullname" . }}-keycloak
  realm:
    {{- $realmJson | fromJson | toYaml | nindent 4 }}
{{- end }}

---
{{/* Alloy API Secret */}}
{{- $alloyValues := default dict (index $.Values "alloy") -}}
{{- $alloyApiValues := default dict (index $alloyValues "alloy-api") -}}
{{- $alloyDbConfig := default dict (index $alloyApiValues "database") -}}
{{- $resourceOwnerAuthorization := default dict (index $alloyApiValues "resourceOwnerAuthorization") -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "crucible.fullname" $ }}-alloy-api-custom
  labels:
    {{- include "crucible.labels" $ | nindent 4 }}
type: Opaque
stringData:
  ConnectionStrings__PostgreSQL: {{ include "crucible.getDbCreds" (dict "dbConfig" $alloyDbConfig "context" $) }}
  ResourceOwnerAuthorization__Authority: {{ tpl (default "" (index $resourceOwnerAuthorization "authority")) $ | quote }}
  ResourceOwnerAuthorization__ClientId: {{ tpl (default "" (index $resourceOwnerAuthorization "clientId")) $ | quote }}
  ResourceOwnerAuthorization__ClientSecret: {{ if $createRealm }}{{ $alloyAdminSecret | quote }}{{ else }}{{ tpl (default "" (index $resourceOwnerAuthorization "clientSecret")) $ | quote }}{{ end }}
  ResourceOwnerAuthorization__UserName: {{ tpl (default "" (index $resourceOwnerAuthorization "userName")) $ | quote }}
  ResourceOwnerAuthorization__Password: {{ tpl (default "" (index $resourceOwnerAuthorization "password")) $ | quote }}

---
{{/* TopoMojo API Secret */}}
{{- $topomojoValues := default dict (index $.Values "topomojo") -}}
{{- $topomojoApiValues := default dict (index $topomojoValues "topomojo-api") -}}
{{- $topomojoDbConfig := default dict (index $topomojoApiValues "database") -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "crucible.fullname" $ }}-topomojo-api-custom
  labels:
    {{- include "crucible.labels" $ | nindent 4 }}
type: Opaque
stringData:
  appsettings.conf: |
    Database__ConnectionString = {{ include "crucible.getDbCreds" (dict "dbConfig" $topomojoDbConfig "context" $) }}

---
{{/* Player API Secret */}}
{{- $playerValues := default dict (index $.Values "player") -}}
{{- $playerApiValues := default dict (index $playerValues "player-api") -}}
{{- $playerDbConfig := default dict (index $playerApiValues "database") -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "crucible.fullname" $ }}-player-api-custom
  labels:
    {{- include "crucible.labels" $ | nindent 4 }}
type: Opaque
stringData:
  ConnectionStrings__PostgreSQL: {{ include "crucible.getDbCreds" (dict "dbConfig" $playerDbConfig "context" $) }}

---
{{/* VM API Secret */}}
{{- $vmApiValues := default dict (index $playerValues "vm-api") -}}
{{- $vmDbConfig := default dict (index $vmApiValues "database") -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "crucible.fullname" $ }}-vm-api-custom
  labels:
    {{- include "crucible.labels" $ | nindent 4 }}
type: Opaque
stringData:
  ConnectionStrings__PostgreSQL: {{ include "crucible.getDbCreds" (dict "dbConfig" $vmDbConfig "context" $) }}
  VmUsageLogging__PostgreSQL: {{ include "crucible.getDbCreds" (dict "dbConfig" (merge (dict "name" "player_vm_logging") $vmDbConfig) "context" $) }}

---
{{/* Blueprint API Secret */}}
{{- $blueprintValues := default dict (index $.Values "blueprint") -}}
{{- $blueprintApiValues := default dict (index $blueprintValues "blueprint-api") -}}
{{- $blueprintDbConfig := default dict (index $blueprintApiValues "database") -}}
{{- $blueprintResourceOwnerAuthorization := default dict (index $blueprintApiValues "resourceOwnerAuthorization") -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "crucible.fullname" $ }}-blueprint-api-custom
  labels:
    {{- include "crucible.labels" $ | nindent 4 }}
type: Opaque
stringData:
  ConnectionStrings__PostgreSQL: {{ include "crucible.getDbCreds" (dict "dbConfig" $blueprintDbConfig "context" $) }}
  ResourceOwnerAuthorization__Authority: {{ tpl (default "" (index $blueprintResourceOwnerAuthorization "authority")) $ | quote }}
  ResourceOwnerAuthorization__ClientId: {{ tpl (default "" (index $blueprintResourceOwnerAuthorization "clientId")) $ | quote }}
  ResourceOwnerAuthorization__ClientSecret: {{ if $createRealm }}{{ $blueprintAdminSecret | quote }}{{ else }}{{ tpl (default "" (index $blueprintResourceOwnerAuthorization "clientSecret")) $ | quote }}{{ end }}
  ResourceOwnerAuthorization__UserName: {{ tpl (default "" (index $blueprintResourceOwnerAuthorization "userName")) $ | quote }}
  ResourceOwnerAuthorization__Password: {{ tpl (default "" (index $blueprintResourceOwnerAuthorization "password")) $ | quote }}

---
{{/* CITE API Secret */}}
{{- $citeValues := default dict (index $.Values "cite") -}}
{{- $citeApiValues := default dict (index $citeValues "cite-api") -}}
{{- $citeDbConfig := default dict (index $citeApiValues "database") -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "crucible.fullname" $ }}-cite-api-custom
  labels:
    {{- include "crucible.labels" $ | nindent 4 }}
type: Opaque
stringData:
  ConnectionStrings__PostgreSQL: {{ include "crucible.getDbCreds" (dict "dbConfig" $citeDbConfig "context" $) }}

---
{{/* Gallery API Secret */}}
{{- $galleryValues := default dict (index $.Values "gallery") -}}
{{- $galleryApiValues := default dict (index $galleryValues "gallery-api") -}}
{{- $galleryDbConfig := default dict (index $galleryApiValues "database") -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "crucible.fullname" $ }}-gallery-api-custom
  labels:
    {{- include "crucible.labels" $ | nindent 4 }}
type: Opaque
stringData:
  ConnectionStrings__PostgreSQL: {{ include "crucible.getDbCreds" (dict "dbConfig" $galleryDbConfig "context" $) }}

---
{{/* Gameboard API Secret */}}
{{- $gameboardValues := default dict (index $.Values "gameboard") -}}
{{- $gameboardApiValues := default dict (index $gameboardValues "gameboard-api") -}}
{{- $gameboardDbConfig := default dict (index $gameboardApiValues "database") -}}
{{- $gameEngineClientSecret := default "" (index $gameboardApiValues "gameEngineClientSecret") -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "crucible.fullname" $ }}-gameboard-api-custom
  labels:
    {{- include "crucible.labels" $ | nindent 4 }}
type: Opaque
stringData:
  Database__ConnectionString: {{ include "crucible.getDbCreds" (dict "dbConfig" $gameboardDbConfig "context" $) }}
  GameEngine__ClientSecret: {{ if $createRealm }}{{ $gameboardApiSecret | quote }}{{ else }}{{ tpl $gameEngineClientSecret $ | quote }}{{ end }}

---
{{/* Caster API Secret */}}
{{- $casterValues := default dict (index $.Values "caster") -}}
{{- $casterApiValues := default dict (index $casterValues "caster-api") -}}
{{- $casterDbConfig := default dict (index $casterApiValues "database") -}}
{{- $casterClient := default dict (index $casterApiValues "client") -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "crucible.fullname" $ }}-caster-api-custom
  labels:
    {{- include "crucible.labels" $ | nindent 4 }}
type: Opaque
stringData:
  ConnectionStrings__PostgreSQL: {{ include "crucible.getDbCreds" (dict "dbConfig" $casterDbConfig "context" $) }}
  Client__UserName: {{ tpl (default "" (index $casterClient "userName")) $ | quote }}
  Client__Password: {{ if $createRealm }}{{ $casterAdminSecret | quote }}{{ else }}{{ tpl (default "" (index $casterClient "password")) $ | quote }}{{ end }}

---
{{/* Steamfitter API Secret */}}
{{- $steamfitterValues := default dict (index $.Values "steamfitter") -}}
{{- $steamfitterApiValues := default dict (index $steamfitterValues "steamfitter-api") -}}
{{- $steamfitterDbConfig := default dict (index $steamfitterApiValues "database") -}}
{{- $steamfitterResourceOwnerAuthorization := default dict (index $steamfitterApiValues "resourceOwnerAuthorization") -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "crucible.fullname" $ }}-steamfitter-api-custom
  labels:
    {{- include "crucible.labels" $ | nindent 4 }}
type: Opaque
stringData:
  ConnectionStrings__PostgreSQL: {{ include "crucible.getDbCreds" (dict "dbConfig" $steamfitterDbConfig "context" $) }}
  ResourceOwnerAuthorization__Authority: {{ tpl (default "" (index $steamfitterResourceOwnerAuthorization "authority")) $ | quote }}
  ResourceOwnerAuthorization__ClientId: {{ tpl (default "" (index $steamfitterResourceOwnerAuthorization "clientId")) $ | quote }}
  ResourceOwnerAuthorization__ClientSecret: {{ if $createRealm }}{{ $steamfitterAdminSecret | quote }}{{ else }}{{ tpl (default "" (index $steamfitterResourceOwnerAuthorization "clientSecret")) $ | quote }}{{ end }}
  ResourceOwnerAuthorization__UserName: {{ tpl (default "" (index $steamfitterResourceOwnerAuthorization "userName")) $ | quote }}
  ResourceOwnerAuthorization__Password: {{ tpl (default "" (index $steamfitterResourceOwnerAuthorization "password")) $ | quote }}

---
{{/* Moodle OIDC Secret */}}
{{- $moodleValues := default dict (index $.Values "moodle") -}}
{{- if $moodleValues.enabled -}}
{{- $moodleMainValues := default dict (index $moodleValues "moodle") -}}
{{- $moodleOidcValues := default dict (index $moodleMainValues "oidc") -}}
{{- if and $moodleOidcValues.enabled $moodleOidcValues.existingSecret -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ tpl $moodleOidcValues.existingSecret $ }}
  labels:
    {{- include "crucible.labels" $ | nindent 4 }}
type: Opaque
stringData:
  {{ $moodleOidcValues.existingSecretKey | default "client-secret" }}: {{ if $createRealm }}{{ $moodleClientSecret | quote }}{{ else }}""{{ end }}
{{- end }}
{{- end }}
