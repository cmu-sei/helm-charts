apiVersion: v2
name: crucible-apps
description: Crucible framework application deployment - A comprehensive cybersecurity training and exercise platform with Keycloak, Player, Caster, Alloy, Blueprint, CITE, Gallery, Gameboard, Steamfitter, TopoMojo, and Moodle
type: application
version: 0.2.3
home: https://cmu-sei.github.io/crucible/

dependencies:
  # Crucible Applications
  - name: alloy
    repository: file://../alloy
    version: 1.8.0
    condition: alloy.enabled

  - name: blueprint
    repository: file://../blueprint
    version: 1.10.0
    condition: blueprint.enabled

  - name: caster
    repository: file://../caster
    version: 1.9.0
    condition: caster.enabled

  - name: cite
    repository: file://../cite
    version: 1.10.0
    condition: cite.enabled

  - name: gallery
    repository: file://../gallery
    version: 1.10.0
    condition: gallery.enabled

  - name: gameboard
    repository: file://../gameboard
    version: 0.6.0
    condition: gameboard.enabled

  - name: player
    repository: file://../player
    version: 1.10.0
    condition: player.enabled

  - name: steamfitter
    repository: file://../steamfitter
    version: 1.8.0
    condition: steamfitter.enabled

  - name: topomojo
    repository: file://../topomojo
    version: 0.9.0
    condition: topomojo.enabled

  # Moodle LMS
  - name: moodle
    repository: file://../moodle
    version: 0.2.7
    condition: moodle.enabled
